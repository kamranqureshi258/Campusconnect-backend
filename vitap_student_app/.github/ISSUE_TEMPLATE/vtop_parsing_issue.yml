name: VTOP Data / Parsing Issue
description: A specific VTOP page or data field is not loading, missing, or incorrect
title: "[VTOP]: "
labels: ["vtop", "rust", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template when VTOP data loads incorrectly, is missing fields, or the app fails to parse a VTOP response.
        These issues often require changes to the Rust parsing layer (`rust/src/api/vtop/parser/`).

  - type: dropdown
    id: data-type
    attributes:
      label: Affected Data
      options:
        - Attendance
        - Timetable
        - Marks
        - Exam Schedule
        - Student Profile
        - Grade History
        - Course Page
        - Digital Assignments
        - Biometric Attendance
        - Outing / Hostel
        - Payment Receipts
        - Semester List
        - Authentication / Captcha
        - Other
    validations:
      required: true

  - type: dropdown
    id: error-type
    attributes:
      label: Error Type
      options:
        - Data missing or partially loaded
        - Wrong / garbled data displayed
        - App crashes on data load
        - Login fails (captcha / authentication)
        - Session keeps expiring
        - Timeout / server unreachable
        - Other
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: "2.3.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the incorrect / missing data? What did the app show vs what VTOP shows in the browser?
      placeholder: |
        The attendance for course XYZ shows 0 classes but VTOP browser shows 12 classes attended.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Log in with valid credentials
        2. Navigate to Attendance
        3. Pull to refresh
        4. See that ...
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: Error Message / Log Output
      description: If you see an error message in the app or have access to debug logs, paste them here.
      render: text

  - type: checkboxes
    id: vtop-check
    attributes:
      label: Verification
      options:
        - label: I have confirmed the data is correct on VTOP's website in a browser
          required: true
        - label: The issue is reproducible consistently, not a one-off network error

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other details, including whether this started after an app update or a VTOP maintenance window.
